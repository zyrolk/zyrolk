<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Clean white background for favicon -->
  <rect width="512" height="512" fill="#ffffff" rx="100" />
  
  <!-- Icon Group: Centered -->
  <g transform="translate(100, 75) scale(1.1)">
    <!-- Shopping Bag Handle -->
    <path d="M 195,145 C 195,95 275,95 275,145" stroke="#0d1117" stroke-width="14" fill="none" stroke-linecap="round" />
    
    <!-- Shopping Bag Body -->
    <path d="M 155,150 L 315,150 L 330,330 C 330,345 315,355 295,355 L 175,355 C 155,355 140,345 140,330 Z" stroke="#0d1117" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Speed Streaks (Wedges pointing left) -->
    <path d="M 180,230 L 70,230 L 160,255 Z" fill="#0052fe" />
    <path d="M 150,270 L 65,270 L 135,295 Z" fill="#0052fe" />
    <path d="M 120,310 L 80,310 L 115,325 Z" fill="#0052fe" />
    
    <!-- Slanted Bold Z -->
    <path d="M 175,160 L 335,160 L 130,320 L 275,320 L 245,350 L 85,350 L 290,190 L 145,190 Z" fill="#0052fe" />
  </g>
</svg>
